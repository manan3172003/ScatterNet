networks:
  ip6net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 2001:db8::/64

services:
  dodgerblue:
    build: .
    command: gunicorn dodgerblue.wsgi:application --bind [::]:5000
    ports:
      - "${EXPOSED_PORT:-5000}:5000"
    env_file:
      - .env
    depends_on:
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ip6net

  postgres:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env.db
    command: postgres -c listen_addresses=*
    ports:
      - "5432:5432"
    networks:
      - ip6net

  test:
    profiles: ["test"]
    build: .
    command: pytest
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
  
volumes:
  postgres_data: