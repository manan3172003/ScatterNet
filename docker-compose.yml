services:
  dodgerblue:
    build: .
    command: gunicorn dodgerblue.wsgi:application --bind 0.0.0.0:5000
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - postgres
  
  postgres:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env.db
    command: postgres -c listen_addresses=*
    ports:
      - "5432:5432"

  test:
    profiles: ["test"]
    build: .
    command: pytest
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
  
volumes:
  postgres_data: